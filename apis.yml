apis:
  - aid: apache-camel:apache-camel-java-dsl
    name: Apache Camel Java DSL API
    description: >-
      The Apache Camel Java DSL provides a fluent API for defining integration routes using Enterprise Integration Patterns. Developers define RouteBuilder subclasses to connect Camel components via endpoints, processors, and transformers.
    humanURL: https://camel.apache.org/manual/java-dsl.html
    tags:
      - DSL
      - Integration
      - Java
      - Routing
    properties:
      - type: Documentation
        url: https://camel.apache.org/manual/java-dsl.html
      - type: APIReference
        url: https://camel.apache.org/manual/camelcontext.html
      - type: GettingStarted
        url: https://camel.apache.org/manual/getting-started.html
  - aid: apache-camel:apache-camel-rest-dsl
    name: Apache Camel REST DSL API
    description: >-
      The Apache Camel REST DSL provides a concise syntax for exposing and consuming RESTful services within Camel routes. It supports both REST service definition and REST proxy/consumer patterns.
    humanURL: https://camel.apache.org/manual/rest-dsl.html
    tags:
      - DSL
      - REST
      - Routing
    properties:
      - type: Documentation
        url: https://camel.apache.org/manual/rest-dsl.html
  - aid: apache-camel:apache-camel-k-operator-api
    name: Apache Camel K Operator API
    description: >-
      The Apache Camel K Operator exposes a Kubernetes Custom Resource API for deploying and managing Camel integrations as cloud-native serverless workloads on Kubernetes and OpenShift.
    humanURL: https://camel.apache.org/camel-k/next/apis/operator/
    tags:
      - Kubernetes
      - Operator
      - Serverless
    properties:
      - type: Documentation
        url: https://camel.apache.org/camel-k/next/apis/operator/
      - type: GettingStarted
        url: https://camel.apache.org/camel-k/next/installation/installation.html
  - aid: apache-camel:apache-camel-quarkus-api
    name: Apache Camel Quarkus API
    description: >-
      Apache Camel Quarkus provides native compilation and fast startup of Camel routes on Quarkus, enabling serverless and microservice deployments with Camel's integration components.
    humanURL: https://camel.apache.org/camel-quarkus/next/index.html
    tags:
      - Quarkus
      - Serverless
    properties:
      - type: Documentation
        url: https://camel.apache.org/camel-quarkus/next/index.html
